<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Master Express</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#25D366">
<link rel="apple-touch-icon" href="logo.png">

<style>
body {
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  margin:0;
  padding:0;
}
.container {
  max-width:500px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
  margin-top:20px;
  position: relative;
}
.logo {
  text-align:center;
}
.logo img {
  width:120px;
}
h2 {
  text-align:center;
  margin-bottom:10px;
}
input, textarea {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:16px;
}
label {
  font-size:14px;
  display:block;
  margin-top:10px;
}
.checkbox-container {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:5px;
  font-size:14px;
}
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}
.whatsapp {
  background:#25D366;
  color:white;
}
.gps {
  background:#007bff;
  color:white;
}
.instalar {
  background:#ff9800;
  color:white;
  font-size:12px;
  padding:8px 10px;
  position:fixed;
  top:10px;
  right:10px;
  border-radius:6px;
  z-index:1000;
}
.footer {
  text-align:center;
  margin-top:15px;
  font-size:14px;
  color:#555;
}
</style>
</head>
<body>

<div class="container">

<!-- Botão Baixar App pequeno no canto superior direito -->
<button class="instalar" id="btnInstall">📲 Baixar App</button>

<div class="logo">
  <img src="logo.png">
</div>

<h2>Master Express</h2>
<p>Entrega rápida no mesmo dia</p>

<input type="text" id="nome" placeholder="Seu nome" required>
<input type="text" id="telefone" placeholder="Telefone">
<input type="text" id="origem" placeholder="Endereço de coleta">
<button class="gps" onclick="pegarLocalizacao()">📍 Usar minha localização</button>
<input type="text" id="destino" placeholder="Endereço de entrega">
<input type="text" id="nomeRecebedor" placeholder="Nome do recebedor">
<input type="text" id="telefoneRecebedor" placeholder="Telefone do recebedor">

<div class="checkbox-container">
  <input type="checkbox" id="urgente">
  <label for="urgente">Pedido Urgente (marque apenas se for realmente urgente)</label>
</div>

<textarea id="detalhes" placeholder="Detalhes do pedido (opcional)"></textarea>
<button class="whatsapp" onclick="enviarPedido()">🚀 Solicitar Entrega</button>

<div class="footer">Entrega rápida em Macaé</div>
</div>

<script>
function enviarPedido(){
  let nome = document.getElementById("nome").value
  let telefone = document.getElementById("telefone").value
  let origem = document.getElementById("origem").value
  let destino = document.getElementById("destino").value
  let nomeRec = document.getElementById("nomeRecebedor").value
  let telRec = document.getElementById("telefoneRecebedor").value
  let detalhes = document.getElementById("detalhes").value
  let urgente = document.getElementById("urgente").checked ? "✅ Sim" : "Não"

  let mensagem =
`🚀 *NOVO PEDIDO MASTER EXPRESS*

👤 Solicitante: ${nome}
📞 Telefone: ${telefone}

📍 Coleta: ${origem}
📦 Entrega: ${destino}

👥 Recebedor: ${nomeRec}
📞 Telefone: ${telRec}

📝 Detalhes: ${detalhes}
⚡ Pedido Urgente: ${urgente}

💬 *Aviso:* O motoboy entrará em contato pelo WhatsApp para informar valor e disponibilidade da entrega.`

  let url = "https://wa.me/5522992150249?text=" + encodeURIComponent(mensagem)
  window.open(url)
}

function pegarLocalizacao(){
  navigator.geolocation.getCurrentPosition(function(pos){
    let lat = pos.coords.latitude
    let lon = pos.coords.longitude
    document.getElementById("origem").value = `https://maps.google.com/?q=${lat},${lon}`
  })
}

// PWA - botão instalar
let deferredPrompt
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault()
  deferredPrompt = e
})
document.getElementById("btnInstall").addEventListener("click", async () => {
  if(deferredPrompt){
    deferredPrompt.prompt()
    deferredPrompt = null
  }
})

// Registrar service worker
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js")
}
</script>

</body>
</html>
