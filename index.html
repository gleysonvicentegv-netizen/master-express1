<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master Express</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  background:#f2f2f2;
}

header{
  background:#000;
  color:#fff;
  text-align:center;
  padding:15px;
}

header img{
  width:80px;
}

.container{
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
  margin-bottom:15px;
}

input, select, textarea, button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  background:#000;
  color:white;
  font-weight:bold;
  border:none;
}

#preco{
  font-size:20px;
  margin-top:10px;
  font-weight:bold;
  text-align:center;
}

#map{
  height:300px;
  border-radius:10px;
}

.urgente-label{
  font-size:14px;
  margin-top:10px;
}

footer{
  text-align:center;
  padding:10px;
  font-size:14px;
  color:#555;
}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  <h2>Master Express</h2>
</header>

<div class="container">

  <div class="card">
    <h3>Dados do remetente</h3>
    <input id="nomeRemetente" placeholder="Nome da pessoa/loja" required>
    <input id="telRemetente" placeholder="Telefone do remetente" required>
  </div>

  <div class="card">
    <h3>Endereço de coleta</h3>
    <input id="coleta" placeholder="Digite o endereço de coleta">
    <button onclick="usarLocalizacao()">📍 Usar minha localização</button>
  </div>

  <div class="card">
    <h3>Dados do recebedor</h3>
    <input id="nomeRecebedor" placeholder="Nome do recebedor" required>
    <input id="telRecebedor" placeholder="Telefone do recebedor" required>
    <label class="urgente-label">
      <input type="checkbox" id="urgente"> Marque apenas se a entrega for urgente
    </label>
    <textarea id="observacoes" placeholder="Observações (opcional)"></textarea>
  </div>

  <div class="card">
    <h3>Endereço de entrega</h3>
    <input id="entrega" placeholder="Digite o endereço de entrega">
    <button onclick="marcarEntrega()">📍 Marcar no mapa</button>
  </div>

  <div class="card">
    <div id="map"></div>
  </div>

  <div class="card">
    <select id="pagamento">
      <option>Dinheiro</option>
      <option>Pix</option>
      <option>Cartão</option>
    </select>

    <div id="preco">Valor da entrega: R$0</div>
    <button onclick="enviarPedido()">Enviar pedido</button>
  </div>

</div>

<footer>
  Master Express • Entrega rápida em Macaé
</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<script>
var map = L.map('map').setView([-22.376, -41.784], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

var markerColeta, markerEntrega;

// Usar localização do cliente para coleta
function usarLocalizacao(){
  navigator.geolocation.getCurrentPosition(function(pos){
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;
    document.getElementById("coleta").value = `${lat},${lon}`;

    if(markerColeta) map.removeLayer(markerColeta);

    markerColeta = L.marker([lat,lon]).addTo(map)
      .bindPopup("Coleta").openPopup();

    map.setView([lat,lon],15);

    calcularPreco();
  });
}

// Marcar endereço de coleta manual (opcional)
function marcarColeta(){
  let endereco = document.getElementById("coleta").value;
  if(!endereco) return;
  fetch("https://nominatim.openstreetmap.org/search?format=json&q="+endereco)
  .then(res => res.json())
  .then(data => {
    let lat = parseFloat(data[0].lat);
    let lon = parseFloat(data[0].lon);

    if(markerColeta) map.removeLayer(markerColeta);

    markerColeta = L.marker([lat,lon]).addTo(map)
      .bindPopup("Coleta").openPopup();

    map.setView([lat,lon],15);

    calcularPreco();
  });
}

// Marcar endereço de entrega no mapa
function marcarEntrega(){
  let endereco = document.getElementById("entrega").value;
  if(!endereco) return alert("Digite o endereço de entrega");

  fetch("https://nominatim.openstreetmap.org/search?format=json&q="+endereco)
  .then(res => res.json())
  .then(data => {
    let lat = parseFloat(data[0].lat);
    let lon = parseFloat(data[0].lon);

    if(markerEntrega) map.removeLayer(markerEntrega);

    markerEntrega = L.marker([lat,lon]).addTo(map)
      .bindPopup("Entrega").openPopup();

    map.setView([lat,lon],15);

    calcularPreco();
  });
}

// Calcular valor da entrega
function calcularPreco(){
  if(!markerColeta || !markerEntrega) return;

  let from = turf.point([markerColeta.getLatLng().lng, markerColeta.getLatLng().lat]);
  let to = turf.point([markerEntrega.getLatLng().lng, markerEntrega.getLatLng().lat]);

  let distance = turf.distance(from, to, {units:'kilometers'});

  let preco = 10;
  if(distance > 3){
    preco = 10 + ((distance - 3) * 1.5);
  }
  preco = preco.toFixed(2);

  document.getElementById("preco").innerText = "Valor da entrega: R$"+preco;
}

// Enviar pedido para WhatsApp
function enviarPedido(){
  if(!markerColeta || !markerEntrega) return alert("Marque coleta e entrega no mapa");

  let nomeR = document.getElementById("nomeRemetente").value;
  let telR = document.getElementById("telRemetente").value;
  let nomeRec = document.getElementById("nomeRecebedor").value;
  let telRec = document.getElementById("telRecebedor").value;
  let observacoes = document.getElementById("observacoes").value || "Não informado";
  let preco = document.getElementById("preco").innerText;
  let pagamento = document.getElementById("pagamento").value;
  let coleta = document.getElementById("coleta").value;
  let entrega = document.getElementById("entrega").value;
  let urgente = document.getElementById("urgente").checked ? "Sim" : "Não";

  let mensagem =
`🚀 *NOVO PEDIDO MASTER EXPRESS*

👤 Remetente: ${nomeR}
📞 Telefone: ${telR}

📍 Coleta: ${coleta}
📦 Entrega: ${entrega}

👥 Recebedor: ${nomeRec}
📞 Telefone: ${telRec}

💰 ${preco}
💳 Pagamento: ${pagamento}
⚠ Urgente: ${urgente}
📝 Observações: ${observacoes}

O motoboy entrará em contato via WhatsApp para informar valor final e disponibilidade.`;

  window.open("https://wa.me/5522992150249?text="+encodeURIComponent(mensagem));
}
</script>

</body>
</html>
