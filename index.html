<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Master Express</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#2c2c2c;
color:white;
text-align:center;
}

header{
padding:20px;
}

.logo{
width:120px;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
margin-top:15px;
padding:14px;
width:100%;
border:none;
border-radius:8px;
font-size:18px;
background:#27ae60;
color:white;
cursor:pointer;
}

#map{
height:300px;
margin-top:20px;
border-radius:10px;
}

.valor{
font-size:22px;
margin-top:15px;
font-weight:bold;
}

</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>

<body>

<header>
<img src="logo.png" class="logo">
<h2>Master Express</h2>
<p>Entrega rápida em Macaé</p>
</header>

<div class="container">

<h3>Quem está enviando</h3>

<input id="nomeRemetente" placeholder="Seu nome">

<input id="telefoneRemetente" placeholder="Seu telefone">

<h3>Quem vai receber</h3>

<input id="nomeDestinatario" placeholder="Nome de quem recebe">

<input id="telefoneDestinatario" placeholder="Telefone de quem recebe">

<input id="enderecoDestino" placeholder="Endereço de entrega">

<textarea id="obs" placeholder="Observações (opcional)"></textarea>

<div id="map"></div>

<div class="valor">
Valor estimado: <span id="valorEntrega">R$10,00</span>
</div>

<button onclick="enviarPedido()">Solicitar entrega</button>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let mapa = L.map('map').setView([-22.3768,-41.7848],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(mapa)

let marcadorColeta = L.marker([-22.3768,-41.7848],{draggable:true}).addTo(mapa)
let marcadorEntrega = L.marker([-22.3800,-41.7900],{draggable:true}).addTo(mapa)

function calcularDistancia(lat1,lon1,lat2,lon2){

let R=6371

let dLat=(lat2-lat1)*Math.PI/180
let dLon=(lon2-lon1)*Math.PI/180

let a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2)

let c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R*c
}

function calcularValor(){

let c = marcadorColeta.getLatLng()
let e = marcadorEntrega.getLatLng()

let distancia = calcularDistancia(c.lat,c.lng,e.lat,e.lng)

let valor = 10

if(distancia > 3){

valor = 10 + ((distancia - 3) * 1.80)

}

document.getElementById("valorEntrega").innerText =
"R$" + valor.toFixed(2)

}

marcadorColeta.on("dragend",calcularValor)
marcadorEntrega.on("dragend",calcularValor)

calcularValor()

function enviarPedido(){

let nomeR = document.getElementById("nomeRemetente").value
let telR = document.getElementById("telefoneRemetente").value

let nomeD = document.getElementById("nomeDestinatario").value
let telD = document.getElementById("telefoneDestinatario").value

let obs = document.getElementById("obs").value

let c = marcadorColeta.getLatLng()
let e = marcadorEntrega.getLatLng()

let valor = document.getElementById("valorEntrega").innerText

let msg =
"📦 NOVA ENTREGA\n\n"+
"Remetente: "+nomeR+"\n"+
"Telefone: "+telR+"\n\n"+
"Destinatário: "+nomeD+"\n"+
"Telefone: "+telD+"\n\n"+
"Valor: "+valor+"\n\n"+
"Observação: "+obs+"\n\n"+
"Coleta:\nhttps://maps.google.com/?q="+c.lat+","+c.lng+
"\n\nEntrega:\nhttps://maps.google.com/?q="+e.lat+","+e.lng

let url =
"https://wa.me/5522992150249?text="+
encodeURIComponent(msg)

window.open(url)

}

</script>

</body>
</html>
